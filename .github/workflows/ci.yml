name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io/examples-java
  # Coordinator version for acceptance tests
  COORDINATOR_VERSION: latest
  # Opt into Node.js 24 for GitHub Actions (required after June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-java:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: just -f justfile.container build

      - name: Test (unit)
        run: just -f justfile.container test-unit

      - name: Lint
        run: just -f justfile.container lint

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target:
          - agg-player
          - agg-table
          - agg-hand
          - saga-table-hand
          - saga-table-player
          - saga-hand-table
          - saga-hand-player
          - pmg-hand-flow
          - prj-output
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${SHORT_SHA},${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image for acceptance tests
        if: github.event_name == 'pull_request'
        run: docker save -o /tmp/${{ matrix.target }}.tar "${{ steps.tags.outputs.tags }}"

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.target }}
          path: /tmp/${{ matrix.target }}.tar
          retention-days: 1

  # Compute image tag for acceptance tests
  compute-tag:
    name: Compute Image Tag
    runs-on: ubuntu-latest
    needs: build-images
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      images-json: ${{ steps.images.outputs.json }}
      coordinator-version: ${{ steps.coord.outputs.version }}
    steps:
      - name: Output coordinator version
        id: coord
        run: echo "version=${{ env.COORDINATOR_VERSION }}" >> $GITHUB_OUTPUT

      - name: Generate image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build images JSON
        id: images
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          # Build JSON object of all example images
          JSON=$(cat <<EOF
          {
            "agg-player": "${PREFIX}-agg-player:${TAG}",
            "agg-table": "${PREFIX}-agg-table:${TAG}",
            "agg-hand": "${PREFIX}-agg-hand:${TAG}",
            "saga-table-hand": "${PREFIX}-saga-table-hand:${TAG}",
            "saga-table-player": "${PREFIX}-saga-table-player:${TAG}",
            "saga-hand-table": "${PREFIX}-saga-hand-table:${TAG}",
            "saga-hand-player": "${PREFIX}-saga-hand-player:${TAG}",
            "pmg-hand-flow": "${PREFIX}-pmg-hand-flow:${TAG}",
            "prj-output": "${PREFIX}-prj-output:${TAG}"
          }
          EOF
          )
          echo "json=$(echo "$JSON" | jq -c '.')" >> $GITHUB_OUTPUT

  # Acceptance test using Kind cluster
  acceptance-test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: [build-images, compute-tag]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          # Install just
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Parse image inputs
        id: images
        env:
          VERSION: ${{ needs.compute-tag.outputs.coordinator-version }}
        run: |
          # Build coordinator images JSON from version
          COORD=$(cat <<EOF
          {
            "aggregate": "ghcr.io/angzarr-io/angzarr-aggregate:${VERSION}",
            "saga": "ghcr.io/angzarr-io/angzarr-saga:${VERSION}",
            "projector": "ghcr.io/angzarr-io/angzarr-projector:${VERSION}",
            "process-manager": "ghcr.io/angzarr-io/angzarr-process-manager:${VERSION}",
            "stream": "ghcr.io/angzarr-io/angzarr-stream:${VERSION}",
            "gateway": "ghcr.io/angzarr-io/angzarr-grpc-gateway:${VERSION}",
            "log": "ghcr.io/angzarr-io/angzarr-log:${VERSION}"
          }
          EOF
          )
          echo "coordinators=$(echo "$COORD" | jq -c '.')" >> $GITHUB_OUTPUT
          echo "Using coordinator version: ${VERSION}"

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: angzarr-test
          config: deploy/kind/cluster.yaml
          node_image: kindest/node:v1.31.0
          wait: 120s

      - name: Create namespace
        run: kubectl create namespace angzarr-test --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace=angzarr-test \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n angzarr-test \
            -p '{"imagePullSecrets": [{"name": "ghcr-pull-secret"}]}' || true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and load coordinator images
        run: |
          IMAGES='${{ steps.images.outputs.coordinators }}'
          echo "Pulling coordinator images..."
          echo "$IMAGES" | jq -r 'to_entries[] | "\(.key): \(.value)"'
          echo "$IMAGES" | jq -r 'to_entries[] | .value' | while read img; do
            echo "Pulling $img..."
            docker pull "$img"
            kind load docker-image "$img" --name angzarr-test
          done

      - name: Download image artifacts
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/images
          pattern: image-*

      - name: Load example images into Kind (PR)
        if: github.event_name == 'pull_request'
        run: |
          for tarball in /tmp/images/image-*/*.tar; do
            echo "Loading $tarball..."
            kind load image-archive "$tarball" --name angzarr-test
          done

      - name: Pull and load example images (push)
        if: github.event_name != 'pull_request'
        run: |
          IMAGES='${{ needs.compute-tag.outputs.images-json }}'
          echo "Pulling example images..."
          echo "$IMAGES" | jq -r 'to_entries[] | "\(.key): \(.value)"'
          echo "$IMAGES" | jq -r 'to_entries[] | .value' | while read img; do
            echo "Pulling $img..."
            docker pull "$img"
            kind load docker-image "$img" --name angzarr-test
          done

      - name: Generate gateway descriptor
        run: |
          # Generate proto descriptor for gateway type discovery
          echo "Generating gateway descriptor from examples protos..."
          buf export buf.build/angzarr/examples -o examples-proto
          buf build examples-proto -o types.bin
          echo "Descriptor size: $(stat -c%s types.bin) bytes"

      - name: Create gateway descriptor ConfigMap
        run: |
          kubectl create configmap gateway-descriptor \
            --from-file=types.bin=types.bin \
            --namespace=angzarr-test \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure
        run: |
          echo "Deploying PostgreSQL..."
          helm upgrade --install angzarr-db \
            oci://ghcr.io/angzarr-io/charts/angzarr-db-postgres-simple \
            --namespace angzarr-test \
            --wait --timeout 2m
          echo "Deploying RabbitMQ..."
          helm upgrade --install angzarr-mq \
            oci://ghcr.io/angzarr-io/charts/angzarr-mq-rabbitmq-simple \
            --namespace angzarr-test \
            --wait --timeout 3m

      - name: Deploy with Helm
        env:
          TAG: ${{ needs.compute-tag.outputs.tag }}
          COORD_VERSION: ${{ needs.compute-tag.outputs.coordinator-version }}
        run: |
          helm upgrade --install angzarr \
            oci://ghcr.io/angzarr-io/charts/angzarr \
            --version 0.5.1 \
            -f deploy/k8s/helm/values.yaml \
            -f deploy/k8s/helm/values-ci.yaml \
            --set images.aggregate.tag="${COORD_VERSION}" \
            --set images.saga.tag="${COORD_VERSION}" \
            --set images.projector.tag="${COORD_VERSION}" \
            --set images.processManager.tag="${COORD_VERSION}" \
            --set images.stream.tag="${COORD_VERSION}" \
            --set images.gateway.tag="${COORD_VERSION}" \
            --set images.log.tag="${COORD_VERSION}" \
            --set "applications.business[0].image.tag=${TAG}" \
            --set "applications.business[1].image.tag=${TAG}" \
            --set "applications.business[2].image.tag=${TAG}" \
            --set "applications.sagas[0].image.tag=${TAG}" \
            --set "applications.sagas[1].image.tag=${TAG}" \
            --set "applications.sagas[2].image.tag=${TAG}" \
            --set "applications.sagas[3].image.tag=${TAG}" \
            --set "applications.processManagers[0].image.tag=${TAG}" \
            --set "applications.projectors[0].image.tag=${TAG}" \
            --namespace angzarr-test \
            --wait --timeout 5m

      - name: Smoke test - wait for pods
        run: |
          echo "Waiting for all pods to be ready..."
          kubectl wait --for=condition=ready pod --all \
            --namespace=angzarr-test \
            --timeout=300s || true

          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr-test -o wide

          # Verify all expected pods are running
          RUNNING=$(kubectl get pods -n angzarr-test --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
          TOTAL=$(kubectl get pods -n angzarr-test --no-headers 2>/dev/null | wc -l)
          echo ""
          echo "Running pods: ${RUNNING}/${TOTAL}"

          if [ "$RUNNING" -lt 1 ]; then
            echo "ERROR: No pods running"
            exit 1
          fi

          # Check that no pods are in CrashLoopBackOff
          CRASHED=$(kubectl get pods -n angzarr-test --no-headers 2>/dev/null | grep -c "CrashLoopBackOff" || true)
          if [ "$CRASHED" -gt 0 ]; then
            echo "ERROR: ${CRASHED} pods in CrashLoopBackOff"
            exit 1
          fi

          echo "Smoke test passed"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Wait for player aggregate
        run: |
          echo "Waiting for player aggregate pod..."
          kubectl wait --for=condition=ready pod -l angzarr.io/domain=player \
            -n angzarr-test --timeout=180s || {
            echo "Player aggregate pod not ready, checking status..."
            kubectl get pods -n angzarr-test
            exit 1
          }

      - name: Run acceptance tests
        env:
          PLAYER_URL: "localhost:1310"
          TABLE_URL: "localhost:1311"
          HAND_URL: "localhost:1312"
        run: |
          kubectl port-forward -n angzarr-test svc/player-aggregate 1310:1310 &
          kubectl port-forward -n angzarr-test svc/table-aggregate 1311:1310 &
          kubectl port-forward -n angzarr-test svc/hand-aggregate 1312:1310 &
          sleep 3
          just -f justfile.container test-acceptance

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr-test -o wide
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n angzarr-test --sort-by='.lastTimestamp' | tail -30
          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods -n angzarr-test -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs $pod -n angzarr-test --all-containers --tail=50 || true
          done

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, build-images, acceptance-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance Tests | ${{ needs.acceptance-test.result }} |" >> $GITHUB_STEP_SUMMARY

          # All jobs must pass to merge
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-images.result }}" != "success" ] || \
             [ "${{ needs.acceptance-test.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
