# Point proto compilation at the angzarr-project submodule directly,
# so the Gradle protobuf plugin compiles from source without file copying.
# This path is resolved relative to the composite build root by the proto build script.
systemProp.angzarrProtoDir=angzarr-project/proto

# Exclude ai_sidecar.proto (enum conflicts with poker_types.proto)
systemProp.angzarrProtoExcludes=examples/ai_sidecar.proto
