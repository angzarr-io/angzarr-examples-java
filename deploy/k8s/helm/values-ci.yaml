# CI-specific overrides for Helm deployment
# Used in addition to values.yaml when deploying in CI

# Image pull secret for GHCR
imagePullSecrets:
  - name: ghcr-pull-secret

# Init containers use host/port for health checks (nc -z)
# Service names match Helm release names
storage:
  postgres:
    uri: "postgres://angzarr:angzarr@angzarr-db:5432/angzarr"
    host: "angzarr-db"
    port: 5432

messaging:
  amqp:
    url: "amqp://angzarr:angzarr@angzarr-mq:5672/%2F"
    host: "angzarr-mq"
    port: 5672
